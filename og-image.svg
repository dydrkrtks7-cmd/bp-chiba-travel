<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b4513"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#daa520"/>
      <stop offset="100%" stop-color="#a0522d"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="1126" cy="473" r="46" fill="#a0522d" opacity="0.12"/>
    <circle cx="369" cy="364" r="22" fill="#a0522d" opacity="0.06"/>
    <circle cx="667" cy="629" r="98" fill="#a0522d" opacity="0.12"/>
    <circle cx="298" cy="88" r="29" fill="#a0522d" opacity="0.18"/>
    <circle cx="248" cy="66" r="36" fill="#a0522d" opacity="0.07"/>
    <circle cx="792" cy="185" r="29" fill="#a0522d" opacity="0.05"/>
    <rect x="1162" y="207" width="67" height="88" rx="8" fill="#8b4513" opacity="0.08" transform="rotate(27, 1039, -74)"/>
    <rect x="1165" y="566" width="21" height="43" rx="8" fill="#8b4513" opacity="0.03" transform="rotate(32, 1117, 721)"/>
    <rect x="973" y="-9" width="74" height="59" rx="8" fill="#8b4513" opacity="0.11" transform="rotate(39, 111, 447)"/>
    <rect x="-30" y="542" width="32" height="86" rx="8" fill="#8b4513" opacity="0.08" transform="rotate(5, 528, 89)"/>
    <rect x="392" y="-73" width="35" height="24" rx="8" fill="#8b4513" opacity="0.13" transform="rotate(6, 122, 497)"/>
    <rect x="29" y="237" width="63" height="98" rx="8" fill="#8b4513" opacity="0.10" transform="rotate(42, 794, 483)"/>
    <rect x="66" y="655" width="50" height="42" rx="8" fill="#8b4513" opacity="0.08" transform="rotate(19, 888, 635)"/>
    <rect x="174" y="666" width="26" height="62" rx="8" fill="#8b4513" opacity="0.13" transform="rotate(1, 1094, 31)"/>
    <polygon points="1175,263 1213,339 1137,339" fill="#a0522d" opacity="0.10"/>
    <polygon points="80,-24 143,102 17,102" fill="#a0522d" opacity="0.11"/>
    <polygon points="775,-36 795,4 755,4" fill="#a0522d" opacity="0.10"/>
    <polygon points="837,123 925,299 749,299" fill="#a0522d" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,556 C360,593 840,519 1200,556 L1200,630 L0,630Z" fill="#a0522d" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Chiba travel 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Chiba — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#daa520" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#daa520" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Chiba Chiba travel 안내 — 정보
  </text>
</svg>